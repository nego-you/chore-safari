<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Chore Safari">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe6f7"/>
      <stop offset="0.55" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f6c84c"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.78" cy="0.18" r="0.4">
      <stop offset="0" stop-color="#fffbe5" stop-opacity="1"/>
      <stop offset="1" stop-color="#fffbe5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 角丸の背景：パステル空 → 砂色グラデ -->
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>

  <!-- 朝日 -->
  <circle cx="400" cy="100" r="120" fill="url(#sun)"/>

  <!-- サバンナの草原 -->
  <path d="M 0 380 Q 256 320 512 380 L 512 512 L 0 512 Z" fill="#9bd16a"/>
  <path d="M 0 410 Q 256 360 512 410 L 512 512 L 0 512 Z" fill="#82c150" opacity="0.7"/>

  <!-- ライオンさん -->
  <g transform="translate(256 320)">
    <!-- たてがみのフチ（散らした円） -->
    <g fill="#b45309">
      <circle cx="-110" cy="-50" r="34"/>
      <circle cx="-110" cy="50" r="34"/>
      <circle cx="110" cy="-50" r="34"/>
      <circle cx="110" cy="50" r="34"/>
      <circle cx="-75" cy="-100" r="34"/>
      <circle cx="75" cy="-100" r="34"/>
      <circle cx="-75" cy="100" r="34"/>
      <circle cx="75" cy="100" r="34"/>
      <circle cx="0" cy="-118" r="34"/>
      <circle cx="0" cy="118" r="34"/>
    </g>

    <!-- たてがみ本体 -->
    <circle r="118" fill="#d97706"/>

    <!-- 耳 -->
    <circle cx="-60" cy="-78" r="22" fill="#d97706"/>
    <circle cx="60" cy="-78" r="22" fill="#d97706"/>
    <circle cx="-60" cy="-78" r="12" fill="#fbbf24"/>
    <circle cx="60" cy="-78" r="12" fill="#fbbf24"/>

    <!-- 顔 -->
    <circle r="82" fill="#fde68a"/>

    <!-- 目 -->
    <circle cx="-28" cy="-12" r="10" fill="#1f2937"/>
    <circle cx="28" cy="-12" r="10" fill="#1f2937"/>
    <circle cx="-25" cy="-16" r="3.5" fill="#ffffff"/>
    <circle cx="31" cy="-16" r="3.5" fill="#ffffff"/>

    <!-- 鼻まわり -->
    <ellipse cx="0" cy="26" rx="36" ry="24" fill="#fef3c7"/>
    <path d="M -12 18 Q 0 6 12 18 Q 12 30 0 30 Q -12 30 -12 18 Z" fill="#1f2937"/>

    <!-- 口 -->
    <path d="M 0 32 L 0 42" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
    <path d="M 0 42 Q -12 52 -24 44" fill="none" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
    <path d="M 0 42 Q 12 52 24 44" fill="none" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>

    <!-- ほっぺ -->
    <circle cx="-58" cy="22" r="10" fill="#fca5a5" opacity="0.6"/>
    <circle cx="58" cy="22" r="10" fill="#fca5a5" opacity="0.6"/>
  </g>
</svg>
