services:
  db:
    image: postgres:16-alpine
    container_name: chore-safari-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chore
      POSTGRES_PASSWORD: chore
      POSTGRES_DB: chore_safari
      TZ: Asia/Tokyo
    ports:
      # ホストからの prisma migrate / psql 用に 5433 で公開（本番では閉じる想定）。
      - "5433:5432"
    volumes:
      - ./pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chore -d chore_safari"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ローカル開発用（HMR・ホットリロード）。手元での編集はこちら。
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: chore-safari-web
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://chore:chore@db:5432/chore_safari?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # 本番ビルド（next build 済み）。Cloudflare Tunnel からはこちらに繋ぐ。
  # HMR の WebSocket が不要なので Cloudflare 経由でも安定して動く。
  web-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: chore-safari-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://chore:chore@db:5432/chore_safari?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      # ホストからの動作確認用（Cloudflare 越しではなく直接見たい時に使う）。
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: chore-safari-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set in .env}
    # 同一 compose ネットワーク上の web-prod:3000 にトンネル接続させる。
    # Cloudflare Zero Trust ダッシュボードの Public Hostname → Service URL を
    # http://web-prod:3000 に変更すること。
    depends_on:
      web-prod:
        condition: service_started
